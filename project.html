<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Debate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --container-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --accent-hover: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --p1-color: #60a5fa;
            --p1-bg: rgba(59, 130, 246, 0.15);
            --p1-border: rgba(96, 165, 250, 0.5);
            --p2-color: #f87171;
            --p2-bg: rgba(239, 68, 68, 0.15);
            --p2-border: rgba(248, 113, 113, 0.5);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            font-weight: 800;
            font-size: 2.5rem;
            margin: 0;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 8px;
            font-weight: 300;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-field.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-left: 4px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            background: var(--accent-gradient);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.5);
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        button:hover:not(:disabled)::before {
            left: 100%;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(139, 92, 246, 0.7);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button.loading {
            background: #334155;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.9;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        button.loading::after {
            content: "";
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #chat-box {
            margin-top: 10px;
            height: 450px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            background: rgba(15, 23, 42, 0.4);
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        #chat-box::-webkit-scrollbar {
            width: 6px;
        }
        #chat-box::-webkit-scrollbar-track {
            background: transparent;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        #chat-box::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .message {
            padding: 18px 24px;
            border-radius: 20px;
            width: fit-content;
            max-width: 85%;
            line-height: 1.6;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid transparent;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .person1 {
            background: var(--p1-bg);
            border-color: var(--p1-border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .person2 {
            background: var(--p2-bg);
            border-color: var(--p2-border);
            margin-left: auto;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .message h4 {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message h4::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .person1 h4::before { background: var(--p1-color); box-shadow: 0 0 8px var(--p1-color); }
        .person2 h4::before { background: var(--p2-color); box-shadow: 0 0 8px var(--p2-color); }

        .person1 h4 { color: var(--p1-color); }
        .person2 h4 { color: var(--p2-color); }

        .message p {
            margin: 0;
            font-size: 1.05rem;
            color: #e2e8f0;
        }

        /* Empty state styling */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            gap: 15px;
            opacity: 0.6;
            margin: auto;
        }
        
        .empty-state svg {
            width: 48px;
            height: 48px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        @media (max-width: 600px) {
            .input-group {
                grid-template-columns: 1fr;
            }
            .input-field.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Historical Debate AI</h2>
        <div class="subtitle">Witness epic clashes of ideology powered by Gemini</div>
    </div>
    
    <div class="input-field full-width">
        <label>Topic for Debate</label>
        <input type="text" id="topic" value="Is technology good for humanity?">
    </div>
    
    <div class="input-group">
        <div class="input-field">
            <label>Person 1</label>
            <input type="text" id="person1" value="Adolf Hitler">
        </div>
        <div class="input-field">
            <label>Person 2</label>
            <input type="text" id="person2" value="Joseph Stalin">
        </div>
    </div>

    <button id="debate-btn" onclick="takeTurn()">Start Debate</button>

    <div id="chat-box">
        <div class="empty-state" id="empty-state">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
            </svg>
            <p>The stage is set.<br>Enter a topic and historical figures to begin.</p>
        </div>
    </div>
</div>

<script>
    const apiKey = "";
    
    let currentTurn = 1;
    let history = [];
    let isLoading = false;

    async function takeTurn() {
        if (isLoading) return;

        const topic = document.getElementById("topic").value;
        const p1Name = document.getElementById("person1").value;
        const p2Name = document.getElementById("person2").value;
        const btn = document.getElementById("debate-btn");
        const chatBox = document.getElementById("chat-box");
        const emptyState = document.getElementById("empty-state");

        if (emptyState) {
            emptyState.style.display = 'none';
        }

        let currentSpeaker = currentTurn === 1 ? p1Name : p2Name;
        let opponent = currentTurn === 1 ? p2Name : p1Name;

        isLoading = true;
        btn.disabled = true;
        btn.classList.add("loading");
        btn.innerText = currentSpeaker + " is thinking...";

        let pastChat = history.map(item => item.speaker + " said: " + item.text).join("\n");
        let promptText = `
        You are completely roleplaying as the historical dictator: ${currentSpeaker}. 
        You are in a fierce, aggressive debate with another historical figure: ${opponent}. 
        The topic is: "${topic}".
        
        Debate History:
        ${pastChat}
        
        Write your next response addressing ${opponent}.
        
        STRICT RULES TO FOLLOW:
        1. MIMIC YOUR HISTORICAL PERSONA PERFECTLY. Do not talk like a normal modern person.
        2. Use the extreme ego, pride, vocabulary, and ruthlessness associated with ${currentSpeaker}.
        3. If you are known for specific catchphrases (like Caesar's "Veni, vidi, vici"), use that style of speech.
        4. Attack ${opponent}'s arguments aggressively based on your own brutal historical methods of ruling.
        5. Keep it short (under 50 words) and use simple, easy-to-read English, but keep the dramatic, dictatorial tone!
        6. Do not include your name in the response.
        `;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });

            const data = await response.json();
            
            let answer = data.candidates[0].content.parts[0].text;

            history.push({ speaker: currentSpeaker, text: answer });

            chatBox.innerHTML += `
                <div class="message ${currentTurn === 1 ? 'person1' : 'person2'}">
                    <h4>${currentSpeaker}</h4>
                    <p>${answer}</p>
                </div>
            `;
            
            chatBox.scrollTop = chatBox.scrollHeight;

            if (currentTurn === 1) {
                currentTurn = 2;
            } else {
                currentTurn = 1;
            }
            
            btn.innerText = "Next Turn";

        } catch (error) {
            alert("Error talking to AI: " + error.message);
        } finally {
            isLoading = false;
            btn.disabled = false;
            btn.classList.remove("loading");
            if(btn.innerText.includes("thinking...")) {
                btn.innerText = "Next Turn";
            }
        }
    }
</script>

</body>
</html>
